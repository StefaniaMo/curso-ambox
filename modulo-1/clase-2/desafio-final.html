<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos</title>
</head>

<body>
    <header>
        <h1>Turnos Médicos</h1>
    </header>
    <section>
        <article>
            <h3>Realice su consulta</h3>
        </article>
    
        <form>
            <label for="nombre">Nombre*</label> <br>
            <input type="text" minlength="3" name="nombre" id="nombre" placeholder="Ingrese su nombre" required> <br><br>

            <label for="email">Email*</label> <br>
            <input type="email" name="email" id="email" placeholder="Ingrese su email" required><br><br>

            <label for="telefono">Telefono*</label> <br>
            <input type="tel" name="telefono" id="telefono" placeholder="Ingrese su telefono"> <br><br>

            <label for="motivo">Especialista*</label><br>
            <select name="motivo" id="motivo" required>
                <option selected></option>
                <option>Clínico Médico</option>
                <option>Gastroenterólogo</option>
                <option>Neurólogo</option>
            </select> <br><br>

            <label for="date">Fecha del turno*</label> <br>
            <input type="date" name="date" id="date" required> <br><br>

            <label for="mensaje">Mensaje</label><br>
            <textarea name="mensaje" id="mensaje" maxlength="100" placeholder="Escriba su mensaje"></textarea><br><br>

            <label>Desea recibir llamados?</label>
            <input type="checkbox"><br>
            <h5>*Todos los campos son obligatorios</h5>
            <button type="submit">Enviar</button>
        </form>
    </section>
</body>

</html>
