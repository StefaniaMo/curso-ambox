<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ranchers&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <title>Deep House Night Sábado 07 de Marzo 2026</title>
</head>
<body>

<main>
    <h1>Deep House Night</h1>
    <h2>Compra YA tu entrada!</h2>
    <h3>Sábado 07 de Marzo 2026 - 22:00 hrs.</h3>
    <form>
        <label for="nombre">Nombre*</label> 
            <input type="text" minlength="3" name="nombre" id="nombre" placeholder="Ingrese su nombre" required> 
        <label for="apellido">Apellido*</label> 
            <input type="text" minlength="3" name="apellido" id="apellido" placeholder="Ingrese su apellido" required> 
        <label for="email">Email*</label> 
            <input type="email" minlength="3" name="email" id="email" placeholder="Ingrese su email" required>  
        <label for="telefono">Teléfono*</label> 
            <input type="tel" name="telefono" id="telefono" placeholder="Ingrese su teléfono" min="10"> 
        
        <label for="tipoEntrada">Tipo de entrada*</label>
        <select name="tipoEntrada" id="tipoEntrada" required>
            <option value="" disabled selected hidden>Selecciona</option>
            <option>General</option>
            <option>VIP</option>
            <option>Meet & Greet</option>
        </select> 
            
        <label for="cantidad" >Cantidad de entradas*</label>
            <input type="number" name="cantidad" required>

        <div id="mayorEdad">
            <label for="mayorEdad">Eres mayor de edad?</label>
            <input type="checkbox" id="mayorEdad" name="mayorEdad" value="true" required>               
        </div>
           
        <h5>*Todos los campos son obligatorios</h5>

        <button type="submit">Proceder con el pago</button>
    </form>
</main>

</body>
</html>
